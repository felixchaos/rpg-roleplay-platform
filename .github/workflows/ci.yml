name: CI

on:
  push:
    branches: [main, master, "路线*"]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rpg_platform_test
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: rpg/pyproject.toml

      - name: Install
        working-directory: rpg
        run: |
          python -m venv .venv
          .venv/bin/pip install -e ".[dev]"

      - name: Ruff
        working-directory: rpg
        run: .venv/bin/ruff check . --exit-non-zero-on-fix

      - name: Mypy (informational)
        working-directory: rpg
        run: .venv/bin/mypy . || true   # mypy 还没全部修干净,先 informational

      - name: Tests
        working-directory: rpg
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rpg_platform_test
        run: |
          .venv/bin/python -m unittest discover -s tests -t . || true
        # TODO: 后端基线 0 fail 后改成 strict
