# 按 target 条件配 target-cpu,绝不用全局 native
# native 会把 CPU 特性烧进二进制,跨机器部署会 SIGILL crash
#
# x86-64-v3 = AVX2 基线(Haswell 2013+,覆盖所有 2015 年后上线服务器)
# 给 serde_json / 字符串处理提供 SIMD 展开空间,且不绑定具体型号
[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "target-cpu=x86-64-v3"]

# aarch64-apple-darwin(本地开发 M 系列 Mac)保持默认,不配 target-cpu
# 若要开启可取消下方注释——仅限本机构建,不得进入 CI/CD 跨平台流程
# [target.aarch64-apple-darwin]
# rustflags = ["-C", "target-cpu=apple-m1"]
