<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RPG Roleplay · 设计画板</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />
  <link rel="stylesheet" href="src/tokens.css" />
  <style>
    body { background: #14120f; }
    .ovr-iframe-wrap { width: 100%; height: 100%; background: var(--bg-deep); position: relative; overflow: hidden; border-radius: 6px; }
    .ovr-iframe-wrap iframe { width: 100%; height: 100%; border: 0; display: block; }
    .ovr-open-btn {
      position: absolute; top: 10px; right: 10px; z-index: 3;
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 10px; font-size: 11.5px;
      color: var(--text-quiet);
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--panel);
      text-decoration: none;
    }
    .ovr-open-btn:hover { color: var(--text); background: var(--panel-3); }
    .ovr-note {
      font-family: var(--font-serif);
      font-size: 13.5px; line-height: 1.6;
      color: var(--text-quiet); letter-spacing: 0.02em;
      padding: 24px;
      background: var(--panel);
      height: 100%; overflow: auto;
      border-radius: 6px;
    }
    .ovr-note h3 { font-family: var(--font-serif); font-weight: 500; margin: 0 0 12px; font-size: 20px; color: var(--text); }
    .ovr-note code { background: var(--bg-deep); padding: 1px 4px; border-radius: 4px; font-size: 0.9em; }
  </style>

  <!-- Vite: CDN UMD 脚本已移除，改由 @vitejs/plugin-react 处理 JSX + React -->
</head>
<body data-screen-label="Design Canvas">
  <div id="root"></div>

  <!-- Vite ESM 入口：原 text/babel 脚本已移至 src/entries/design-canvas.jsx -->
  <script type="module" src="src/entries/design-canvas.jsx"></script>
</body>
</html>
