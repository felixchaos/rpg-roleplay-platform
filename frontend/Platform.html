<body data-screen-label="Platform">
  <div id="root"></div>

  <!-- task 102A: 通用响应式 + 拖动基础 (useBreakpoint / useResizable / ResizeHandle) -->
  <script type="text/babel" src="src/responsive.jsx?v=20260527-ime1"></script>
  <!-- task 90: Markdown 渲染 (Claude 网页同款),给所有 jsx 组件用 -->
  <script type="text/babel" src="src/markdown-render.jsx?v=20260527-md1"></script>
  <script type="text/babel" src="src/game-icons.jsx"></script>
  <script type="text/babel" src="src/branch-graph.jsx"></script>
  <!-- platform-app.jsx defines shell + helpers (PromptModal, ConfirmModal, SettingsToggle,
       fmtBytes, useAutoSave, usePlatformData, Icon …) and exposes them via window. The
       page files below depend on those globals, so platform-app.jsx must load first.
       Within the page files, saves.jsx must come before scripts.jsx because scripts.jsx
       uses <NewGameModal /> (defined in saves.jsx). 顺序: platform shell → saves →
       scripts → cards → settings → tweaks. -->
  <script type="text/babel" src="src/platform-app.jsx?v=20260527-resize2"></script>
  <script type="text/babel" src="src/pages/saves.jsx?v=20260528-ux1"></script>
  <script type="text/babel" src="src/pages/scripts.jsx?v=20260526-rpg"></script>
  <script type="text/babel" src="src/pages/cards.jsx?v=20260526-rpg"></script>
  <script type="text/babel" src="src/pages/settings.jsx?v=20260526-rpg"></script>
  <script type="text/babel" src="src/tweaks-panel.jsx"></script>
  <!-- task 57: navigation helper 必须先于 panel 加载,让 panel 的 on_navigation_required handler 拿到 window.handleAssistantNavigation -->
  <script type="text/babel" src="src/console-assistant-navigation.jsx?v=20260527-gc1"></script>
  <script type="text/babel" src="src/console-assistant-panel.jsx?v=unify1"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    /* tweakable */
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "startPage": "profile",
      "sidebarWidth": 244,
      "accent": "terracotta"
    }/*EDITMODE-END*/;

    // task 11/18: 把 #branches 这类旧外链映射到真路由；
    // 但只能映射"在 ids 列表里没有"的 hash，否则会把本来合法的（如 #scripts）改成不存在的 id。
    // 例如 #scripts 在 PL_NAV 里就是 ScriptsPage subPage=list，不要重写。
    const HASH_ALIASES = { "branches": "saves-branches" };
    function parsePageFromHash() {
      const raw = location.hash.replace("#", "");
      const hash = HASH_ALIASES[raw] || raw;
      const ids = [...(window.PL_NAV || []).filter(i => i.id).map(i => i.id), "me", "me-edit", "me-settings", "saves-branches", "scripts-import", "cards-npc"];
      if (!ids.includes(hash)) return null;
      // 别名命中：把 URL 同步到规范 hash，让用户看到正确路由（无 reload）
      if (raw !== hash) {
        try { history.replaceState(null, "", "#" + hash); } catch (_) {}
      }
      return hash;
    }

    const ConsoleAssistantPanel = window.ConsoleAssistantPanel || (() => null);

    function PlatformApp() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const [page, setPage] = useState(parsePageFromHash() || t.startPage || "profile");
      // task 55: 助手开关提到根,通过 props 下发,挤压式布局生效
      const [assistantOpen, setAssistantOpen] = useState(false);

      // 接 window.openConsoleAssistant / closeConsoleAssistant 全局事件
      useEffect(() => {
        const bus = window.__capBus || (window.__capBus = new EventTarget());
        const onOpen = () => setAssistantOpen(true);
        const onClose = () => setAssistantOpen(false);
        const onToggle = () => setAssistantOpen(v => !v);
        bus.addEventListener("cap-open", onOpen);
        bus.addEventListener("cap-close", onClose);
        bus.addEventListener("cap-toggle", onToggle);
        return () => {
          bus.removeEventListener("cap-open", onOpen);
          bus.removeEventListener("cap-close", onClose);
          bus.removeEventListener("cap-toggle", onToggle);
        };
      }, []);

      useEffect(() => {
        const onHashChange = () => {
          const p = parsePageFromHash();
          if (p) setPage(p);
        };
        window.addEventListener("hashchange", onHashChange);
        return () => window.removeEventListener("hashchange", onHashChange);
      }, []);

      const go = (id) => {
        setPage(id);
        history.replaceState(null, "", "#" + id);
      };

      let body = null;
      if (page === "profile") body = <ProfilePage />;
      else if (page === "me") body = <MePage subPage="overview" />;
      else if (page === "me-edit") body = <MePage subPage="edit" />;
      else if (page === "me-settings") body = <MePage subPage="settings" />;
      else if (page === "scripts") body = <ScriptsPage subPage="list" />;
      else if (page === "scripts-import") body = <ScriptsPage subPage="import" />;
      else if (page === "modules") body = <ModulesPage />;
      else if (page === "saves") body = <SavesPage subPage="list" />;
      else if (page === "saves-branches") body = <SavesPage subPage="branches" />;
      else if (page === "library") body = <LibraryPage />;
      else if (page === "cards") body = <CardsPage subPage="user" />;
      else if (page === "cards-npc") body = <CardsPage subPage="npc" />;
      else if (page === "settings") body = <SettingsPage />;
      else if (page === "usage") body = <UsagePage />;
      else if (page === "plugins") body = <CapPage kind="plugins" />;
      else if (page === "mcp") body = <CapPage kind="mcp" />;
      else if (page === "skills") body = <CapPage kind="skills" />;
      else if (page === "apis") body = <CapPage kind="apis" />;
      else body = <ProfilePage />;

      return (
        <>
          <PlatformShell
            page={page}
            setPage={go}
            assistantOpen={assistantOpen}
            onOpenAssistant={() => setAssistantOpen(true)}
            assistant={
              <ConsoleAssistantPanel
                open={assistantOpen}
                onClose={() => setAssistantOpen(false)}
                pageContext={{ tab: "platform." + page }}
              />
            }
          >{body}</PlatformShell>

          {/* task 127: 删 Platform 页面的 Tweaks 调试面板 — 用户不要这个内部入口 */}
        </>
      );
    }

    // 未登录访问平台页：跳转到 Login，避免显示 mock admin / 误以为已登录。
    // 设计/离线预览可通过 ?offline=1 绕过（数据保持 mock baseline）。
    const __mount = () => ReactDOM.createRoot(document.getElementById("root")).render(<PlatformApp />);
    const __gateThenMount = (info) => {
      const offline = new URLSearchParams(location.search).has("offline");
      if (info && info.online && !info.authed && !offline) {
        const next = encodeURIComponent(location.pathname + location.search + location.hash);
        location.replace("Login.html?next=" + next);
        return;
      }
      __mount();
    };
    if (window.RPG_DATA_READY) {
      window.RPG_DATA_READY.then(__gateThenMount);
    } else {
      __mount();
    }
  </script>
</body>
</html>
