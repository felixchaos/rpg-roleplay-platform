  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo, useCallback } = React;
    // task 21（修订）：之前 task 15 引入的 `__late = (name) => (props) => React.createElement(window[name], props)`
    // 包装会让 Chrome renderer 在 Game Console 上崩溃（"Aw, Snap! Error 5"，Playwright Target crashed）。
    // 我做了二分隔离：单独渲染任一被 __late 包装的组件 → 30s 内必崩；改成直接引用
    // `window.X` → 立即正常。具体机制怀疑是 babel-standalone 编译输出 + React 18 dev 模式下
    // anonymous wrapper 不停 createElement 触发的 reconciler 病态路径（也可能与 React DevTools
    // 树遍历有关）。
    // 修法：改回直接 `const X = window.X || (() => null)` —— 用 `||` 兜底，
    // 万一某天 game-app.jsx 没加载到，也只渲染 null 而不是 ReferenceError 整页白屏。
    // 注意：babel-standalone 是按 DOM 顺序处理 script，game-app.jsx (script #4) 必定在
    // 本 inline script (script #6) 之前执行；所以 fallback 仅作防御性兜底，正常路径稳定。
    const HistoryDrawer = window.HistoryDrawer || (() => null);
    const SearchDrawer = window.SearchDrawer || (() => null);
    const LeftRail = window.LeftRail || (() => null);
    const TopBar = window.TopBar || (() => null);
    const ChatArea = window.ChatArea || (() => null);
    const ConsoleAssistantPanel = window.ConsoleAssistantPanel || (() => null);
    const RunSteps = window.RunSteps || (() => null);
    const GameToastStack = window.GameToastStack || (() => null);  // task 14: 可见 toast 容器

    /* === Tweakable defaults — DO NOT MOVE the markers; the host rewrites this block === */
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "composerMode": "compact",
      "runStyle": "line",
      "defaultRightTab": "status",
      "rightPanelWidth": 320,
      "narrativeFont": "serif",
      "monoFont": "jetbrains",
      "uiSize": 13,
      "narrativeSize": 15,
      "density": "normal",
      "showRail": true
    }/*EDITMODE-END*/;

    // ----- run-state helpers -----
    // 高层"思考状态"映射：把后端 agent 事件的工程化 phase（prompt/intent/llm_curator/
    // manifest/provider:* /assembly/rules_engine/main_gm/acceptance_check/aborted ...）翻译成
    // 玩家看得懂的 4 段进度（context → rules → gm → save），避免把 raw debug trace
    // 铺满聊天区。完整 phase / 详细 payload 仍保留在 runState.rawSteps 里，由 ChatArea
    // 的"详情"折叠或顶部"查看 SSE"打开。
    // 注：上面 `*` 和 `/` 中间故意留空格——防止字符序列被解析器当成块注释结尾。
    const PUBLIC_STAGES = {
      context: { id: "context", label: "正在整理剧情上下文", order: 1 },
      rules:   { id: "rules",   label: "正在检查规则与权限", order: 2 },
      gm:      { id: "gm",      label: "正在生成 GM 回复",   order: 3 },
      save:    { id: "save",    label: "正在保存本轮结果",   order: 4 },
      system:  { id: "system",  label: "正在处理本轮行动",   order: 0 },
    };
    function mapAgentPhase(phase) {
      if (!phase) return null;
      if (
        phase === "prompt" ||
        phase === "intent" ||
        phase === "llm_curator" ||
        phase === "manifest" ||
        phase === "assembly" ||
        phase === "context_retrieve" ||
        phase === "context_agent" ||
        phase === "world_check" ||
        phase === "prompt_assemble" ||
        phase === "aborted" ||
        (typeof phase === "string" && phase.startsWith("provider:"))
      ) return PUBLIC_STAGES.context;
      if (phase === "rules_engine" || phase === "acceptance_check") return PUBLIC_STAGES.rules;
      if (phase === "main_gm") return PUBLIC_STAGES.gm;
      return PUBLIC_STAGES.system;
    }
    /* 单调推进：只往后走，不回退（避免 main_gm 之后来一个 acceptance_check 把
       UI 又拉回到"规则检查"那一格）。 */
    function advancePublicStage(prevId, nextStage) {
      if (!nextStage) return prevId;
      const prev = (prevId && PUBLIC_STAGES[prevId]) || null;
      if (!prev) return nextStage.id;
      return nextStage.order >= prev.order ? nextStage.id : prev.id;
    }

    const STREAM_CHUNKS = [
      "你转过身去看沈知微，雾灯把她的侧脸照得发青。她没再追问残页，反而把腰上的铜针袋解下来，递到你手里。",
      "\n\n『先收着。』她说，『北港有人来了——是从南陵跟过来的。』",
      "\n\n海雾忽然又厚一层。你借着雾色看向北港，看见三个穿青衣的人正在台阶下停步。其中走在最前的一个，腰间挂着南陵巡检的腰牌——是韩司直。",
      "\n\n他抬头朝你的方向看了一眼，又像是没看见，绕过石阶往灯塔的方向去了。",
      "\n\n沈知微低声道：『他在等天黑。等天黑你就走不掉了。』",
    ];

    /* ----- App ----- */
    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const openTweaks = () => window.postMessage({ type: "__activate_edit_mode" }, "*");

      // task 45：登录态零 mock。初始 state 全部空对象/空数组；reloadState 拿到真数据
      // 之前用 structuredClone(window.MOCK_STATE) 当初始值 —— 用户首屏就看见『顾承砚 / 北港码头』
      // 等示例数据当真档，task 33 修过 panel 容错但初始值仍是 mock。
      // 匿名访客若想看示例，再走 IS_ANON 路径加载（页底有专门 fallback 处理）。
      const IS_ANON = !(window.RPG_AUTH && window.RPG_AUTH.authed);
      const EMPTY_STATE = {
        player: { name: "", role: "", background: "", current_location: "" },
        world: { time: "", weather: "", known_events: [], timeline: {} },
        relationships: {},
        memory: {},
        worldline: {},
        ruleset: {},
        player_character: {},
        scene: {},
        encounter: {},
        dice_log: [],
        permissions: { mode: "full_access", pending_writes: [], pending_questions: [] },
        suggestions: [],
        turn: 0,
        history: [],
      };
      const INITIAL_STATE = IS_ANON && window.MOCK_STATE ? structuredClone(window.MOCK_STATE) : structuredClone(EMPTY_STATE);
      const [game, setGame] = useState(INITIAL_STATE);
      const [history, setHistory] = useState(INITIAL_STATE.history || []);
      const [text, setText] = useState("");
      const [attachments, setAttachments] = useState([]);
      // task 39 收尾：不再 hardcode mock model id ("gpt-4o-mini-rpg")。
      // 这个 state 现在仅供乐观切换时本地暂存；真值由 gameState.app.model 主导
      // (_currentModelLabel 优先读 gameState.app.model)。
      const [model, setModel] = useState(null);
      const [permission, setPermission] = useState((INITIAL_STATE.permissions && INITIAL_STATE.permissions.mode) || "full_access");
      const getRightTabForLocation = (fallback) => {
        const hash = String(location.hash || "").replace(/^#/, "");
        const tabs = window.PANEL_TABS || [];
        return tabs.some(tab => tab.id === hash) ? hash : fallback;
      };
      const [activeTab, setActiveTab] = useState(() => getRightTabForLocation(t.defaultRightTab || "status"));
      const [railCollapsed, setRailCollapsed] = useState(false);
      const [panelCollapsed, setPanelCollapsed] = useState(false);
      const [showSlash, setShowSlash] = useState(false);
      const [showPlus, setShowPlus] = useState(false);
      const [showModel, setShowModel] = useState(false);
      const [showPerm, setShowPerm] = useState(false);
      const [hasError, setHasError] = useState(false);
      const [showHistoryDrawer, setShowHistoryDrawer] = useState(false);
      const [showSearchDrawer, setShowSearchDrawer] = useState(false);
      const [showInGameSettings, setShowInGameSettings] = useState(false);
      // task 55: 助手挤压式开关
      const [assistantOpen, setAssistantOpen] = useState(false);
      // task 102E/104: 游戏左栏宽度可拖, 拖动期间直写 :root --gc-rail-w 绕过 React
      const _railResize = (typeof window !== "undefined" && window.useResizable) ? window.useResizable({
        storageKey: "gc.rail.w", defaultSize: 240, min: 180, max: 360, side: "left",
        cssVar: "--gc-rail-w",
      }) : { size: 240, dragHandleProps: {} };
      const gcRailW = _railResize.size;
      const gcRailDragProps = _railResize.dragHandleProps;
      // 右侧 panel 拖动 resize: side="right" 表示拖左边缘缩宽
      const _panelResize = (typeof window !== "undefined" && window.useResizable) ? window.useResizable({
        storageKey: "gc.panel.w", defaultSize: 320, min: 180, max: 520, side: "right",
      }) : { size: 320, setSize: () => {}, dragHandleProps: {} };
      const gcPanelW = _panelResize.size;
      const gcPanelDragProps = _panelResize.dragHandleProps;
      // 拖到 < 180px 阈值时自动折叠右侧面板
      useEffect(() => {
        if (gcPanelW < 180 && !panelCollapsed) setPanelCollapsed(true);
        else if (gcPanelW >= 180 && panelCollapsed && gcPanelW !== 320) setPanelCollapsed(false);
      }, [gcPanelW]);
      useEffect(() => {
        const bus = window.__capBus || (window.__capBus = new EventTarget());
        const onOpen = () => setAssistantOpen(true);
        const onClose = () => setAssistantOpen(false);
        const onToggle = () => setAssistantOpen(v => !v);
        bus.addEventListener("cap-open", onOpen);
        bus.addEventListener("cap-close", onClose);
        bus.addEventListener("cap-toggle", onToggle);
        return () => {
          bus.removeEventListener("cap-open", onOpen);
          bus.removeEventListener("cap-close", onClose);
          bus.removeEventListener("cap-toggle", onToggle);
        };
      }, []);
      const [pickedCommand, setPickedCommand] = useState(null);
      // task 50：错误状态下 "重试本轮 / 查看 SSE" 之前是 dead button。
      // 记下最后一条 user 输入用于重试，记下最近一次 SSE 事件流用于查看。
      const [lastPlayerText, setLastPlayerText] = useState("");
      const [sseLog, setSseLog] = useState([]);  // [{t, kind, payload}]
      const [sseLogOpen, setSseLogOpen] = useState(false);

      // run state
      // task 92：把"工程 trace"和"玩家看到的思考状态"拆开。
      //   publicStage / label —— 当前对玩家展示的高层进度（context/rules/gm/save），由 mapAgentPhase 翻译；
      //   rawSteps —— 后端原样 agent 事件（prompt/intent/llm_curator/manifest/provider:*/assembly/rules_engine/main_gm/acceptance_check ...），
      //               主聊天区不直接渲染，仅在"详情"折叠 / "查看 SSE" 弹窗里给好奇玩家或开发者看；
      //   completedAt / completedElapsed —— on_done 后短暂显示「已完成 · X.Xs」用，过 1.8s 自动收起。
      // detail 字段仍保留（LeftRail 仍读 runState.detail 兜底空字符串）。
      const [runState, setRunState] = useState({
        running: false,
        publicStage: null,
        label: "",
        detail: "",
        totalElapsed: 0,
        completedAt: 0,
        completedElapsed: 0,
        rawSteps: [],
      });
      const runRef = useRef({ timers: [], stopped: false, sse: null, doneTimer: null });

      // confirm
      const [pendingWrites, setPendingWrites] = useState((INITIAL_STATE.permissions && INITIAL_STATE.permissions.pending_writes) || []);
      const [pendingQuestions, setPendingQuestions] = useState((INITIAL_STATE.permissions && INITIAL_STATE.permissions.pending_questions) || []);

      // ---- API state sync ----
      // task 10：放真实存档列表 + 当前 save 字段，给 LeftRail 用
      const [realSaves, setRealSaves] = useState([]);
      const [activeSave, setActiveSave] = useState(null);  // { id, title, updated_at }
      // task 21 (Chrome OOM)：之前 setGame(g => ({...g, ...data})) 把后端 /api/state 整包
      // 全塞进 game state —— 包含 tools/models/app（admin 角色下可能 200KB+），加上
      // 100+ 条 history、每次 setGame 触发整个组件树 reconcile，React DevTools/快照可能
      // 把 renderer 内存爆掉（用户实测 Chrome "Aw, Snap! Error 5"）。
      // 修法：白名单 UI 真用到的字段，剩下的丢掉；history 走自己的 setHistory。
      const PICK_STATE_KEYS = ["player","world","relationships","memory","worldline","permissions","suggestions","turn",
        "ruleset","player_character","scene","encounter","dice_log","content_pack",
        "active_entities",  // 三层人物系统 (轻量在场实体索引) — PanelCharacters 读
        "app","models"];  // Composer 的 ContextUsage / Model 下拉读这两个
      // task 124: 这些字段是 per-save ephemeral,切档时如果 /api/state 没返回新值,**必须清零**,
      // 不能继承上一档(否则切到新档还看到旧档的"基于当前剧情"建议)。
      const RESETTABLE_KEYS = new Set(["suggestions"]);
      const reloadState = useCallback(async () => {
        try {
          const data = await window.api.game.state();
          if (data && data.player) {
            setGame(g => {
              const next = { ...g };
              for (const k of PICK_STATE_KEYS) {
                if (data[k] !== undefined) {
                  next[k] = data[k];
                } else if (RESETTABLE_KEYS.has(k)) {
                  // task 124: 跨档清零,不继承
                  next[k] = Array.isArray(g[k]) ? [] : (typeof g[k] === "object" ? {} : null);
                }
              }
              // _raw 只留 save 上下文，不保留整包响应
              next._raw = { save_id: data.save_id ?? null, save_title: data.save_title ?? null, turn: data.turn ?? null };
              return next;
            });
            if (Array.isArray(data.history)) setHistory(data.history);
            if (data.permissions) {
              setPermission(data.permissions.mode || "full_access");
              setPendingWrites(data.permissions.pending_writes || []);
              setPendingQuestions(data.permissions.pending_questions || []);
            }
            // task 114: 如果是全新存档 (history 空 + turn=0), 自动触发开场叙事 — GM
            // 给玩家一段引导旁白介绍剧本背景 + 玩家角色 + 当前场景。否则用户看到全空,
            // 不知道接下来该做什么。只在用户首次进入此存档时跑一次,本会话内 cache。
            try {
              const isFresh = (
                (!Array.isArray(data.history) || data.history.length === 0) &&
                (data.turn === 0 || data.turn == null) &&
                data.save_id != null
              );
              const seenKey = "gc.opened_save." + data.save_id;
              const alreadyOpened = sessionStorage.getItem(seenKey);
              if (isFresh && !alreadyOpened) {
                sessionStorage.setItem(seenKey, "1");
                // fire-and-forget opening generation
                setTimeout(() => {
                  try {
                    const sse = window.api && window.api.raw && window.api.raw.sseStream;
                    if (!sse) return;
                    let openingText = "";
                    // task 121a: 立即插入 thinking placeholder,避免用户看到 5-15s 黑屏以为卡死
                    setHistory(h => {
                      const arr = Array.isArray(h) ? [...h] : [];
                      arr.push({ role: "assistant", content: "正在为你拉开剧本帷幕…", _opening: true, _thinking: "starting" });
                      return arr;
                    });
                    sse("/api/v1/opening", {}, {
                      // task 121a: stage 事件 → 更新 thinking pill 文案
                      on_stage: (d) => {
                        const label = (d && d.label) || "";
                        const phase = (d && d.phase) || "";
                        if (!label && phase !== "done") return;
                        setHistory(h => {
                          const arr = Array.isArray(h) ? [...h] : [];
                          if (arr.length && arr[arr.length-1]._opening && !openingText) {
                            arr[arr.length-1] = { ...arr[arr.length-1], content: label || arr[arr.length-1].content, _thinking: phase };
                          }
                          return arr;
                        });
                      },
                      on_token: (d) => {
                        const t = (d && d.text) || "";
                        if (t) {
                          openingText += t;
                          setHistory(h => {
                            const arr = Array.isArray(h) ? [...h] : [];
                            if (arr.length && arr[arr.length-1].role === "assistant" && arr[arr.length-1]._opening) {
                              arr[arr.length-1] = { ...arr[arr.length-1], content: openingText, _thinking: null };
                            } else {
                              arr.push({ role: "assistant", content: openingText, _opening: true });
                            }
                            return arr;
                          });
                        }
                      },
                      on_done: () => {
                        // task 125: 开场结束 — 只 reload **state 部分** (player/world/timeline/suggestions),
                        // 不要替换 history (前端已经流式收完整),避免整段 chat 重渲闪烁。
                        setTimeout(async () => {
                          try {
                            const data = await window.api.game.state();
                            if (data && data.player) {
                              setGame(g => {
                                const next = { ...g };
                                for (const k of PICK_STATE_KEYS) {
                                  if (k === "suggestions") {  // 这个还是要更新,新档需要
                                    if (data[k] !== undefined) next[k] = data[k];
                                  } else if (data[k] !== undefined) {
                                    next[k] = data[k];
                                  }
                                }
                                return next;
                              });
                              // 不动 history!
                            }
                          } catch (_) {}
                        }, 300);
                      },
                      on_error: (e) => {
                        console.warn("[opening] sse error", e);
                        // task 121a: 错误也清掉 thinking placeholder
                        setHistory(h => {
                          const arr = Array.isArray(h) ? [...h] : [];
                          if (arr.length && arr[arr.length-1]._opening && arr[arr.length-1]._thinking) {
                            arr.pop();
                          }
                          return arr;
                        });
                      },
                    });
                  } catch (e) { console.warn("[opening] trigger error", e); }
                }, 800);
              }
            } catch (_) {}
          }
          // 后端 task 10 起会在 /api/state 顶层放 save_id/save_title
          if (data && data.save_id != null) {
            setActiveSave({ id: data.save_id, title: data.save_title || `存档 #${data.save_id}`, updated_at: data.save_updated_at || "" });
          }
        } catch (_) { /* offline fallback to mock */ }
      }, []);
      // 同步真实 saves 列表（用作 LeftRail 切换菜单 + 兜底 currentSaveId）
      const reloadSaves = useCallback(async () => {
        try {
          const r = await window.api.saves.list();
          const list = Array.isArray(r) ? r : (r?.items || r?.saves || []);
          const norm = list.map(window.__normalizeSave || ((x) => x));
          setRealSaves(norm);
          // 如果 /api/state 没给 save_id，至少回退到「saves 里 current=true 的那条」或第一条真实存档
          setActiveSave((prev) => {
            if (prev && norm.some(s => s.id === prev.id)) return prev;
            const cur = norm.find(s => s.current) || norm[0];

        setText(""); setAttachments([]);
        setShowSlash(false); setShowPlus(false);

        setRunState({
          running: true,
          publicStage: "context",
          label: PUBLIC_STAGES.context.label,
          detail: "",
          totalElapsed: 0,
          completedAt: 0,
          completedElapsed: 0,

        const tickerId = setInterval(() => {

            },

              const piece = (data && (data.text || data.delta)) || "";
              if (!piece) return;

                if (!last || last.role !== "assistant") return [...h, { role: "assistant", content: piece, ts, streaming: true }];

            },
            // task 92：后端 agent 事件仍按 phase 流推送（prompt/intent/llm_curator/manifest/
            // provider:*/assembly/rules_engine/main_gm/acceptance_check ...），但主 UI 不再原样
            // 渲染——
            //   1) 原始事件全量 append 到 runState.rawSteps，"详情" / "查看 SSE" 用；
            //   2) 通过 mapAgentPhase 翻译成 4 段玩家可读的高层进度（context→rules→gm→save），
            //      只有 stage 单调推进时才更新 publicStage / label；
            //   3) 不把 raw debug 字段（manifest_kind、context_providers、rule_results、prompt 等）
            //      暴露给主聊天区。
            on_agent: (data) => {
              resetInactivityTimer();  // task 132
              logEvent("agent", data);
              if (!data || !data.phase) return;
              const mapped = mapAgentPhase(data.phase);
              setRunState(r => {
                const rawSteps = Array.isArray(r.rawSteps) ? r.rawSteps.slice() : [];
                const idx = rawSteps.findIndex(s => s.phase === data.phase);
                const merged = {
                  phase: data.phase,
                  message: data.message || (idx >= 0 ? rawSteps[idx].message : data.phase),
                  status: data.status || "running",
                  elapsed_ms: data.elapsed_ms ?? (idx >= 0 ? rawSteps[idx].elapsed_ms : 0),
                  detail: data.detail || (idx >= 0 ? rawSteps[idx].detail : undefined),
                };
                if (idx >= 0) rawSteps[idx] = { ...rawSteps[idx], ...merged };
                else rawSteps.push(merged);
                // public stage 只往前推；同一个 stage 内只刷新 label（避免一直闪）
                const nextStageId = advancePublicStage(r.publicStage, mapped);
                const nextLabel = (nextStageId && PUBLIC_STAGES[nextStageId]) ? PUBLIC_STAGES[nextStageId].label : r.label;
                // 玩家按下停止：让 stage 立刻清掉，由 stopRun / on_done 接管收尾
                if (data.status === "stopped") {

                }
                return { ...r, rawSteps, publicStage: nextStageId, label: nextLabel, detail: "" };
              });
            },
            // task 92：updates 事件分三档（payload.stage）：
            //   "pre_llm"      —— /set 等指令的早期写入，主 GM 还没开始；不动 publicStage
            //   "rules_engine" —— 规则裁定后的写入；跟 rules_engine agent 事件同档，让 mapper 处理
            //   undefined      —— 主 GM 结束后的最终 updates，这才是真正的「正在保存本轮结果」
            // 不展示具体 items（那些是工程日志，留给右侧"结构化更新"面板）。
            on_updates: (data) => {
              logEvent("updates", data);
              const stage = data && data.stage;
              if (stage === "pre_llm" || stage === "rules_engine") return;
              setRunState(r => {
                const nextStageId = advancePublicStage(r.publicStage, PUBLIC_STAGES.save);
                return { ...r, publicStage: nextStageId, label: PUBLIC_STAGES[nextStageId].label, detail: "" };
              });
            },
            on_done: (data) => {
              if (runRef.current.inactivityTimer) { clearTimeout(runRef.current.inactivityTimer); runRef.current.inactivityTimer = null; }  // task 132
              logEvent("done", { status: !!data && data.status ? "ok" : "noop", interrupted: data && data.interrupted, usage: data && data.usage });
              clearInterval(tickerId);
              setHistory(h => {
                const last = h[h.length - 1];
                if (!last || last.role !== "assistant") return h;
                return [...h.slice(0, -1), { ...last, streaming: false, streaming_done: true }];
              });
              // task 92：本轮收尾——running 立刻置 false，但保留 completedAt 给 ChatArea 短暂显示
              // 「已完成 · X.Xs」(~1.8s 后自动收起)。publicStage 留着让"完成"那一格 UI 知道渲染哪种图标。
              setRunState(r => ({
                ...r,
                running: false,
                label: "本轮完成",
                detail: "",
                completedAt: Date.now(),
                completedElapsed: r.totalElapsed,

              runRef.current.doneTimer = setTimeout(() => {
                runRef.current.doneTimer = null;

              // payload 在 data.status，不是 data.state。旧代码读 data.state[k] 永远 undefined，

              const payload = (data && data.status) || null;

            on_error: (data) => {

              if (runRef.current.doneTimer) { clearTimeout(runRef.current.doneTimer); runRef.current.doneTimer = null; }
              if (runRef.current.inactivityTimer) { clearTimeout(runRef.current.inactivityTimer); runRef.current.inactivityTimer = null; }
              // task 31：后端的 error event payload 是 {message: "..."}，不是 {detail: ...}。
              // 之前只看 data?.detail → 永远拿不到真因，UI 还硬编码显示"上游 504"，

            onClose: () => {

              });

              setHistory(h => {
                const last = h[h.length - 1];
                if (!last || last.role !== "assistant" || !last.streaming) return h;
                return [...h.slice(0, -1), { ...last, streaming: false, streaming_done: true }];
              });
            },
          }
        );
      }, [attachments, model, pickedCommand]);

      const startRun = useCallback((playerText) => {

        setShowSlash(false); setShowPlus(false);

        if (runRef.current.doneTimer) { clearTimeout(runRef.current.doneTimer); runRef.current.doneTimer = null; }

          { phase: "prompt",       message: "加载上下文子代理运行提示（模式：local_fallback）。", duration: 220 },
          { phase: "intent",       message: "未发现显式时间跳跃；沿用当前锁定时间线。", duration: 180 },
          { phase: "manifest",     message: "已解析 ContentPack：novel · woaileni", duration: 260 },
          { phase: "provider:novel_retrieval", message: "novel_retrieval 贡献 4 层、6 条事实", duration: 620 },
          { phase: "assembly",     message: "已生成主 GM 上下文清单。", duration: 200 },

          const stepStart = Date.now();
          // 进入这一 phase：先记一条 running 到 rawSteps + 推进 publicStage
          setRunState((r) => {

            let chunkIdx = 0;
            const chunkInterval = setInterval(() => {
              if (runRef.current.stopped) { clearInterval(chunkInterval); return; }
              if (chunkIdx >= STREAM_CHUNKS.length) { clearInterval(chunkInterval); return; }
              const piece = STREAM_CHUNKS[chunkIdx++];
              setHistory((h) => {

                if (!last || last.role !== "assistant") return h;
                return [...h.slice(0, -1), { ...last, content: (last.content || "") + piece }];
              });
            }, step.duration / (STREAM_CHUNKS.length + 1));

          }
          const timerB = setTimeout(() => {
            if (runRef.current.stopped) return;
            setRunState((r) => {
              const rawSteps = r.rawSteps.slice();
              const idx = rawSteps.findIndex(s => s.phase === step.phase);
              if (idx >= 0) rawSteps[idx] = { ...rawSteps[idx], status: "done", elapsed_ms: step.duration };

            });
            if (step.phase === "main_gm") {
              setHistory((h) => {
                const last = h[h.length - 1];
                if (!last || last.role !== "assistant") return h;
                return [...h.slice(0, -1), { ...last, streaming: false, streaming_done: true }];
              });
            }
            runStep(i + 1);
          }, step.duration);
          runRef.current.timers.push(timerB);
        };
        runStep(0);
      }, [history.length, attachments]);

      const onSend = () => {
        if (!text.trim() && !attachments.length) return;
        if (runState.running) return;
        setHasError(false);
        startRun(text.trim() || "（仅附件，请基于本轮上下文推进。）");
      };
      // task 130: 一键继续 — 跳过 textarea,直接发任意系统级指令给 GM
      const onSendRaw = useCallback((raw) => {
        if (runState.running) return;
        const t = (raw || "").trim();
        if (!t) return;
        setHasError(false);
        startRun(t);
      }, [runState.running, startRun]);
      const onStop = () => stopRun();

      // task 50：重试本轮 = 用 lastPlayerText 再发一次（不需要用户在 composer 里重新输入）
      const onRetry = useCallback(() => {
        if (runState.running) return;
        const t = lastPlayerText && lastPlayerText.trim();
        if (!t) {
          window.__apiToast?.("没有可重试的输入", { kind: "warn", duration: 2000 });
          return;
        }
        setHasError(false);
        startRun(t);
      }, [lastPlayerText, runState.running]);
      // task 50：查看 SSE = 打开本轮 SSE 事件流弹窗（含 send + status/agent/token/done/error）
      const onShowSse = useCallback(() => setSseLogOpen(true), []);

      const onSlashPick = (cmd) => {
        // task 39：trigger 以空格结尾的命令（/set /loc /time /var ...）需要用户继续输入
        // 参数。pickedCommand chip 的旧路径不会把 trigger 拼回 message，后端只会拿到
        // 用户的裸 args → 命令没生效。改为直接把 trigger 写进 text，让 message 含完整
        // `/set 时间=...` 一并发给后端，apply_player_directives 才能识别。
        if (cmd && typeof cmd.trigger === "string" && cmd.trigger.endsWith(" ")) {
          setText(cmd.trigger);
          setPickedCommand(null);
          setShowSlash(false);
          return;
        }
        setPickedCommand(cmd);
        setText("");
        setShowSlash(false);
      };
      const onAttachPick = (item) => {
        const fixtures = {
          file: { name: "南陵卷宗.md", kind: "file" },
          image: { name: "雾港地图.png", kind: "image" },
          chapter: { name: "第 314 章 · 北港", kind: "chapter" },
          card: { name: "角色卡 · 沈知微", kind: "card" },
          world: { name: "世界书 · 残页", kind: "world" },
          mcp: { name: "MCP · 文件检索", kind: "mcp" },
          skill: { name: "Skill · 角色一致性", kind: "skill" },
          plan: { name: "计划模式", kind: "skill" },
        };
        setAttachments((a) => [...a, fixtures[item.id] || { name: item.label, kind: "file" }]);
        setShowPlus(false);
      };

      // task 53：审批回调签名升级。ConfirmStrip 现在传 {id, index} 对象，
      // 不再只传单纯 id 字符串。后端按 id 优先 / index fallback 处理。
      // 旧的 setPendingWrites(arr.filter(w => w.id !== id)) 在老数据 id=undefined
      // 时会把所有 undefined.id 的项一起清掉（=全清），现在按 (id || index) 去重。
      const _matchPending = (target) => (item, idx) => {
        if (target.id != null && item.id != null) return item.id !== target.id;
        return idx !== target.index;
      };
      const onApprove = async (target) => {
        setPendingWrites((arr) => arr.filter(_matchPending(target)));
        try { await window.api.game.pendingWrite({ id: target.id, index: target.index, action: "approve" }); }
        catch (e) { window.__apiToast?.("审批失败", { kind: "danger", detail: e?.message }); }
        // 重拉 state 保证服务端 = 客户端（防乐观更新与服务端不一致）
        try { const d = await window.api.game.state(); if (d && d.permissions) {
          setPendingWrites(d.permissions.pending_writes || []);
          setPendingQuestions(d.permissions.pending_questions || []);
        } } catch (_) {}
      };
      const onReject = async (target) => {
        setPendingWrites((arr) => arr.filter(_matchPending(target)));
        try { await window.api.game.pendingWrite({ id: target.id, index: target.index, action: "reject" }); }
        catch (e) { window.__apiToast?.("拒绝失败", { kind: "danger", detail: e?.message }); }
        try { const d = await window.api.game.state(); if (d && d.permissions) {
          setPendingWrites(d.permissions.pending_writes || []);
          setPendingQuestions(d.permissions.pending_questions || []);
        } } catch (_) {}
      };
      const onAnswerQuestion = async (target, choice) => {
        setPendingQuestions((arr) => arr.filter(_matchPending(target)));
        const nextAction = String(choice || "").trim();
        try { await window.api.game.clearQuestions({ id: target.id, index: target.index, choice }); }
        catch (e) { window.__apiToast?.("回答失败", { kind: "danger", detail: e?.message }); }
        try { const d = await window.api.game.state(); if (d && d.permissions) {
          setPendingWrites(d.permissions.pending_writes || []);
          setPendingQuestions(d.permissions.pending_questions || []);
        } } catch (_) {}
        if (nextAction) startRun(nextAction);
      };
      const onDismissConfirm = (target) => {
        // 仅本地隐藏，不通知后端（用户"稍后处理"），下次刷新会重新出现
        setPendingWrites((arr) => arr.filter(_matchPending(target)));
        setPendingQuestions((arr) => arr.filter(_matchPending(target)));
      };

      // memory mode toggles
      useEffect(() => {
        // Push permission changes
        if (!window.api) return;
        window.api.game.permissions({ mode: permission }).catch(() => {});
      }, [permission]);

      // apply density / size
      const rootStyle = useMemo(() => {
        const densityMap = { compact: 0.92, normal: 1, comfy: 1.1 };
        return {
          "--density": densityMap[t.density] || 1,
          "--ui-size": t.uiSize + "px",
          "--narrative-size": t.narrativeSize + "px",
        };
      }, [t.density, t.uiSize, t.narrativeSize]);

      const handleErrorDemo = () => {
        setHasError(true);
      };

      // task 21（防御性）：把首屏拆成两阶段。
      // 第一帧：骨架 + Composer（用户立刻看到输入框可以打字）
      // rAF 后：LeftRail + TopBar + ChatArea + RightPanel + Tweaks + Drawers + ToastStack
      // 即便某个二阶段组件首次 render 很重（mock state 中的数据 + 多次 useEffect），
      // 也不会阻塞第一帧；浏览器/Playwright 至少能拿到 DOM、找到 textarea、点击发送。
      const [mountStage, setMountStage] = useState(0);
      useEffect(() => {
        if (mountStage >= 2) return;
        const id = requestAnimationFrame(() => {
          requestAnimationFrame(() => setMountStage(s => Math.min(2, s + 1)));
        });
        return () => cancelAnimationFrame(id);
      }, [mountStage]);

      return (
        <div className="gc-shell" style={{ ...rootStyle, "--gc-rail-w": gcRailW + "px" }}>
          {/* task 14: 可见 toast 容器（portal 到 body）。第 2 阶段才挂，第一帧不阻塞 */}
          {mountStage >= 2 && <GameToastStack />}
          {/* 第 1 阶段：LeftRail（含 BranchTreeRail 关闭、structured updates 列表小，不重） */}
          {mountStage >= 1 ? <LeftRail
            resizeHandle={<div className="gc-rail-resize-handle" title="拖动调整宽度 · 双击恢复默认" {...gcRailDragProps} />}
            collapsed={railCollapsed}
            onToggle={() => setRailCollapsed(c => !c)}
            state={game}
            runState={runState}
            onNew={() => {
              // Codex P0-3 修复:旧代码调 /api/new 只重置 runtime,**不建 game_save**。
              // 用户看到"新建游戏"按钮,以为在创建新存档,实际只是清掉当前 runtime
              // 玩着同一个 save 上的不同对话 —— 分支系统看不到,刷新就没了。
              //
              // 新建存档需要选剧本 + 角色 + 走 saves.create → activate 原子流。
              // Game Console 没有完整的 NewGameModal,导引用户回平台『存档』走正规流程。
              if (!confirm("新建存档需要选择剧本与角色,将跳到平台『存档目录』走正规创建流。\n\n确认跳转?")) return;
              window.open("Platform.html#saves-list", "_blank");
            }}
            onSave={async () => {
              try { await window.api.game.saveGame(); window.__apiToast?.("已保存", { kind: "ok" }); }
              catch (e) { window.__apiToast?.("保存失败", { kind: "danger", detail: e?.message }); }
            }}
            onSwitchSave={async (sid) => {
              try {
                await window.api.saves.activate(sid);
                reloadState();
              } catch (e) { window.__apiToast?.("切换失败", { kind: "danger", detail: e?.message }); }
            }}
            onMemoryMode={async (mode) => {
              setGame(g => ({ ...g, memory: { ...(g.memory || {}), mode } }));
              try { await window.api.game.memoryMode(mode); } catch (_) {}
            }}
            currentSaveId={activeSave?.id ?? null}
            /* task 45：登录态零 mock；只有匿名访客 + 完全无真实存档时才回退到 MOCK_PLATFORM.saves（保留 designer offline preview） */
            saves={realSaves.length ? realSaves : ((window.RPG_AUTH && window.RPG_AUTH.authed) ? [] : (window.MOCK_PLATFORM?.saves || []))}
          /> : <aside className="gc-rail" aria-hidden="true" />}

          <main className="gc-main">
            {/* 第 1 阶段：TopBar；Drawers 第 2 阶段（默认 open=false 渲染开销极小，
                但内部 useEffect 会注册 Esc 监听等，分批挂避免和 Composer focus 抢） */}
            {mountStage >= 1 && <TopBar
              state={game}
              saveUpdatedAt={activeSave?.updated_at || ""}
              onOpenTweaks={openTweaks}
              onOpenSearch={() => setShowSearchDrawer(true)}
              onOpenHistory={() => setShowHistoryDrawer(true)}
              onOpenSettings={() => setShowInGameSettings(true)}
              railCollapsed={railCollapsed}
              onExpandRail={() => setRailCollapsed(false)}
              panelCollapsed={panelCollapsed}
              onExpandPanel={() => setPanelCollapsed(false)}
              assistantCollapsed={!assistantOpen}
              onExpandAssistant={() => setAssistantOpen(true)}
            />}
            {mountStage >= 2 && <>
              {/* task 45：把真实存档标题传进去，避免硬编码 mock 标题 */}
              <GameSettingsModal open={showInGameSettings} onClose={() => setShowInGameSettings(false)}
                saveTitle={activeSave?.title || game?._raw?.save_title || ""} />
              <HistoryDrawer open={showHistoryDrawer} history={history} onClose={() => setShowHistoryDrawer(false)} />
              <SearchDrawer open={showSearchDrawer} history={history} state={game} onClose={() => setShowSearchDrawer(false)} />
            </>}

            {mountStage >= 1 ? <ChatArea
              history={history}
              runState={runState}
              runStyle={t.runStyle}
              narrativeFont={t.narrativeFont}
              narrativeSize={t.narrativeSize}
              hasError={hasError}
              /* task 38：把当前激活 save id 透给 ChatArea → MsgActions 才能发
                 {save_id, message_index} 给 /api/branches/continue。
                 PICK_STATE_KEYS 不含 save_id，所以走 activeSave 或 game._raw 两条兜底。 */
              saveId={(activeSave && activeSave.id) || (game && game._raw && game._raw.save_id) || null}
              /* task 50：重试本轮 / 查看 SSE 之前是 dead button */
              onRetry={onRetry}
              onShowSse={onShowSse}
            /> : <div className="gc-chat" aria-busy="true" />}

            <div className="gc-foot-wrap">
              <ConfirmStrip
                pendingWrites={pendingWrites}
                pendingQuestions={pendingQuestions}
                onApprove={onApprove}
                onReject={onReject}
                onAnswer={onAnswerQuestion}
                onDismiss={onDismissConfirm}
              />
              <Composer
                text={text} setText={setText}
                onSend={onSend} onStop={onStop} running={runState.running}
                onSendRaw={onSendRaw}
                permission={permission} setPermission={setPermission}
                model={model} setModel={setModel}
                composerMode={t.composerMode}
                suggestions={game.suggestions}
                /* task 48：透传 game 让 @ mention 走真 state.relationships */
                gameState={game}
                attachments={attachments}
                removeAttachment={(i) => setAttachments(a => a.filter((_, j) => j !== i))}
                onAttachPick={onAttachPick}
                onSlashPick={onSlashPick}
                pickedCommand={pickedCommand}
                onClearCommand={() => setPickedCommand(null)}
                showSlash={showSlash} showPlus={showPlus} showModel={showModel} showPerm={showPerm}
                toggleSlash={() => { setShowSlash(s => !s); setShowPlus(false); setShowModel(false); setShowPerm(false); }}
                togglePlus={() => { setShowPlus(s => !s); setShowSlash(false); setShowModel(false); setShowPerm(false); }}
                toggleModel={() => { setShowModel(s => !s); setShowSlash(false); setShowPlus(false); setShowPerm(false); }}
                togglePerm={() => { setShowPerm(s => !s); setShowSlash(false); setShowPlus(false); setShowModel(false); }}
              />
            </div>
          </main>

          {/* task 50：SSE 事件流弹窗（"查看 SSE" 触发） */}
          {sseLogOpen && (
            <div className="gc-overlay" style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setSseLogOpen(false)}>
              <div onClick={(e)=>e.stopPropagation()} style={{width:"min(860px, 92vw)", maxHeight:"82vh", background:"var(--surface, #1a1d22)", color:"var(--text, #e6e6e6)", borderRadius:8, border:"1px solid var(--line, #333)", display:"flex", flexDirection:"column", overflow:"hidden"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",borderBottom:"1px solid var(--line, #333)"}}>
                  <strong>本轮 SSE 事件流（{sseLog.length} 条）</strong>
                  <div style={{display:"flex",gap:8}}>
                    <button className="btn ghost" onClick={async ()=>{
                      try { await navigator.clipboard.writeText(JSON.stringify(sseLog, null, 2)); window.__apiToast?.("已复制全部事件", { kind:"ok", duration:1500 }); }
                      catch { window.__apiToast?.("复制失败", { kind:"danger" }); }
                    }}>复制 JSON</button>
                    <button className="btn ghost" onClick={()=>setSseLogOpen(false)}>关闭</button>
                  </div>
                </div>
                <div style={{overflow:"auto",padding:"8px 16px",fontFamily:"var(--font-mono, ui-monospace, SFMono-Regular, Menlo, monospace)",fontSize:12,lineHeight:1.5}}>
                  {sseLog.length === 0 && <div style={{padding:"24px 0",color:"var(--muted, #888)"}}>暂无事件（本轮未开始或已被清空）</div>}
                  {sseLog.map((ev, i) => (
                    <div key={i} style={{padding:"4px 0", borderBottom:"1px dashed var(--line-soft, #2a2d33)"}}>
                      <span style={{color:"var(--muted-2, #777)"}}>[{new Date(ev.t).toISOString().slice(11, 23)}]</span>{" "}
                      <span style={{color:"var(--accent, #d4a45e)"}}>{ev.kind}</span>{" "}
                      <span style={{whiteSpace:"pre-wrap", wordBreak:"break-all"}}>{JSON.stringify(ev.payload)}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* 第 2 阶段：RightPanel + 它下面的 PanelStatus/PanelMemory 等 */}
          {mountStage >= 2 && <RightPanel
            state={game}
            activeTab={activeTab}
            setActiveTab={setActiveTab}
            sidebarWidth={gcPanelW}
            density={t.density}
            collapsed={panelCollapsed}
            onToggle={() => setPanelCollapsed(c => !c)}
            resizeHandle={<div className="gp-panel-resize-handle" title="拖动调整宽度 · 双击恢复默认" {...gcPanelDragProps} />}
          />}

          {/* 窄屏 float ⌖ 按钮 — CSS @media(max-width:768px) 才显示 */}
          <button className="gc-float-panel-btn" onClick={() => { setPanelCollapsed(false); _panelResize.setSize(320); }}
            title="打开状态面板">⌖</button>

          {/* task 127: 删 Tweaks 调试面板 — 用户不要这个内部入口 */}

          {/* task 55: 助手挤压式布局 —— gc-shell 是 display:flex,助手作为最后
              一个 flex child;折叠时 cap-root display:none 完全消失,展开时 360px
              自动压缩主内容/右侧面板。开关在 TopBar 右上角的展开图标。 */}
          {mountStage >= 2 && <ConsoleAssistantPanel
            open={assistantOpen}
            onClose={() => setAssistantOpen(false)}
            pageContext={{ tab: "game_console", save_id: activeSave?.id ?? null }}
          />}
        </div>
      );
    }

    // 未登录访问游戏控制台：跳转到 Login（同 Platform.html）。?offline=1 可绕过。
    const __mount = () => ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    const __gateThenMount = (info) => {
      const offline = new URLSearchParams(location.search).has("offline");
      if (info && info.online && !info.authed && !offline) {
        const next = encodeURIComponent(location.pathname + location.search + location.hash);
        location.replace("Login.html?next=" + next);
        return;
      }
      __mount();
    };
    if (window.RPG_DATA_READY) {
      window.RPG_DATA_READY.then(__gateThenMount);
    } else {
      __mount();
    }
  </script>
</body>
</html>
