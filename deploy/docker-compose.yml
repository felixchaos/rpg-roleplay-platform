services:
  backend:
    image: rpg-app:latest
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: always
    ports:
      - "7860:7860"
    environment:
      DATABASE_URL: postgres://rpg:rpg@postgres:5432/rpg
      REDIS_URL: redis://redis:6379

      # API-key encryption master key (multiuser refuses to start without it).
      # openssl rand -hex 32 — leaking it = all stored user API keys decryptable.
      # you mast set this in production.
      RPG_MASTER_KEY: your_master_key_here

      # 部署模式只有两个规范值:server / local。
      # server = 多用户:强制鉴权 + db 存储 + 危险工具默认关(本部署用这个)。
      # local  = 单用户本地:免鉴权 + file 存储。
      # 非 local 一律按 server 处理(fail-closed),故无需再单设 RPG_REQUIRE_AUTH。
      RPG_DEPLOYMENT_MODE: ${RPG_DEPLOYMENT_MODE:-server}

      RPG_PORT: "7860"
      RPG_HOST: "0.0.0.0"

      RPG_CORS_ORIGINS: ${RPG_CORS_ORIGINS:-https://play.stellatrix.icu}

      # LLM / embeddings (env key = admin/local fallback; users bring their own keys)
      # ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      # EMBED_BASE_URL: ${EMBED_BASE_URL}
      # EMBED_MODEL: ${EMBED_MODEL:-text-embedding-004}
      # EMBED_API_KEY: ${EMBED_API_KEY}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7860/api/state || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Daily account hard-delete + audit-log cleanup.
  cron:
    image: rpg-app:latest
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: always
    command:
      - "/bin/sh"
      - "-c"
      - "while true; do python -m rpg.scripts.run_cron all; sleep 86400; done"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://rpg:rpg@postgres:5432/rpg
      RPG_MASTER_KEY: your_master_key_here
      RPG_DEPLOYMENT_MODE: ${RPG_DEPLOYMENT_MODE:-server}

  postgres:
    image: pgvector/pgvector:0.8.2-pg17-trixie
    restart: always
    environment:
      POSTGRES_DB: rpg
      POSTGRES_USER: rpg
      POSTGRES_PASSWORD: rpg
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rpg -d rpg"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    restart: always
    image: valkey/valkey:9.0.1
    healthcheck:
      test: "valkey-cli ping"
      interval: 5s
      retries: 20

volumes:
  postgres_data:
