# RPG Roleplay — clean self-host / cloud-native compose
#
# One app container (backend = FastAPI + bundled frontend/dist, listens 0.0.0.0:7860),
# plus its two stateful deps. Services talk over the compose default network by
# hostname (postgres / redis). No nginx, no pgbouncer.
#
# Migrations auto-apply on boot against postgres:5432 directly (advisory lock works
# on a direct connection — that's why pgbouncer is gone).

services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg17-trixie
    container_name: rpg-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rpg
      POSTGRES_USER: rpg
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rpg -d rpg"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rpg-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:?set REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?set REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    image: rpg-app:latest
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: rpg-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # The only published port. Container listens 0.0.0.0:7860.
    ports:
      - "7860:7860"
    environment:
      # Direct to postgres (no pgbouncer). psycopg accepts the postgres:// prefix.
      DATABASE_URL: postgres://rpg:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/rpg
      REDIS_URL: redis://:${REDIS_PASSWORD:?set REDIS_PASSWORD}@redis:6379

      # API-key encryption master key (multiuser refuses to start without it).
      # openssl rand -hex 32 — leaking it = all stored user API keys decryptable.
      RPG_MASTER_KEY: ${RPG_MASTER_KEY:?set RPG_MASTER_KEY=$(openssl rand -hex 32)}

      RPG_DEPLOYMENT_MODE: ${RPG_DEPLOYMENT_MODE:-multiuser}
      RPG_REQUIRE_AUTH: ${RPG_REQUIRE_AUTH:-1}

      # Direct postgres has no pooler in front, so keep pool_max * workers under
      # postgres max_connections (default 100). 10 * 4 = 40, room for cron + admin.
      RPG_DB_POOL_MAX: ${RPG_DB_POOL_MAX:-10}
      RPG_WORKERS: ${RPG_WORKERS:-4}

      RPG_PORT: "7860"
      RPG_HOST: "0.0.0.0"

      RPG_CORS_ORIGINS: ${RPG_CORS_ORIGINS:-https://play.stellatrix.icu}
      RPG_COOKIE_SAMESITE: ${RPG_COOKIE_SAMESITE:-lax}
      RPG_COOKIE_SECURE: ${RPG_COOKIE_SECURE:-1}

      RPG_RATE_LIMIT_PER_MIN: ${RPG_RATE_LIMIT_PER_MIN:-100}
      RPG_REQUEST_TIMEOUT_SECS: ${RPG_REQUEST_TIMEOUT_SECS:-30}
      RPG_BODY_LIMIT_BYTES: ${RPG_BODY_LIMIT_BYTES:-2097152}
      RPG_UPLOAD_BODY_LIMIT_BYTES: ${RPG_UPLOAD_BODY_LIMIT_BYTES:-52428800}

      # LLM / embeddings (env key = admin/local fallback; users bring their own keys)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      EMBED_BASE_URL: ${EMBED_BASE_URL}
      EMBED_MODEL: ${EMBED_MODEL:-text-embedding-004}
      EMBED_API_KEY: ${EMBED_API_KEY}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7860/api/state || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s

  # Daily account hard-delete + audit-log cleanup.
  cron:
    image: rpg-app:latest
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: rpg-cron
    restart: unless-stopped
    command:
      - "/bin/sh"
      - "-c"
      - "while true; do python -m rpg.scripts.run_cron all; sleep 86400; done"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://rpg:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/rpg
      RPG_MASTER_KEY: ${RPG_MASTER_KEY:?set RPG_MASTER_KEY}
      RPG_DEPLOYMENT_MODE: ${RPG_DEPLOYMENT_MODE:-multiuser}

volumes:
  postgres_data:
  redis_data:
